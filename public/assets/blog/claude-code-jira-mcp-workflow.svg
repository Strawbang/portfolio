<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#6b7280"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="260" rx="12" fill="#0f172a"/>

  <!-- === COLUMN 1: Jira === -->
  <!-- Jira Ticket -->
  <rect x="30" y="40" width="140" height="52" rx="8" fill="#1e3a8a"/>
  <text x="100" y="62" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">Jira Ticket</text>
  <text x="100" y="80" text-anchor="middle" fill="#60a5fa" font-size="10">PROJ-1234</text>

  <!-- Arrow down: Ticket → MCP -->
  <line x1="100" y1="92" x2="100" y2="126" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Jira MCP -->
  <rect x="30" y="126" width="140" height="52" rx="8" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1"/>
  <text x="100" y="148" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">Jira MCP</text>
  <text x="100" y="165" text-anchor="middle" fill="#60a5fa" font-size="10">reads ticket</text>

  <!-- Arrow right: MCP → Claude Code -->
  <line x1="170" y1="152" x2="264" y2="152" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- === COLUMN 2: Claude Code (center) === -->
  <!-- CLAUDE.md above -->
  <rect x="270" y="30" width="150" height="52" rx="8" fill="#4c1d95"/>
  <text x="345" y="52" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">CLAUDE.md</text>
  <text x="345" y="70" text-anchor="middle" fill="#a78bfa" font-size="10">project context</text>

  <!-- Arrow down: CLAUDE.md → Claude Code -->
  <line x1="345" y1="82" x2="345" y2="122" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Claude Code (main box, bigger) -->
  <rect x="265" y="122" width="160" height="66" rx="8" fill="#92400e"/>
  <text x="345" y="148" text-anchor="middle" fill="#fde68a" font-size="13" font-weight="700">Claude Code</text>
  <text x="345" y="166" text-anchor="middle" fill="#fcd34d" font-size="10">navigates · implements</text>
  <text x="345" y="180" text-anchor="middle" fill="#fcd34d" font-size="10">fixes · iterates</text>

  <!-- Arrow down: Claude Code → Codebase -->
  <line x1="345" y1="188" x2="345" y2="220" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Codebase below -->
  <rect x="265" y="220" width="160" height="30" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="345" y="239" text-anchor="middle" fill="#94a3b8" font-size="10">Legacy Codebase</text>

  <!-- Arrow right: Claude Code → PR -->
  <line x1="425" y1="155" x2="520" y2="155" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- === COLUMN 3: Output === -->
  <rect x="520" y="122" width="160" height="66" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
  <text x="600" y="148" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="700">Pull Request</text>
  <text x="600" y="165" text-anchor="middle" fill="#34d399" font-size="10">diff ready for review</text>
  <text x="600" y="180" text-anchor="middle" fill="#34d399" font-size="10">tests passing</text>

  <!-- Labels -->
  <text x="100" y="18" text-anchor="middle" fill="#475569" font-size="10" font-weight="600" letter-spacing="1">INPUT</text>
  <text x="345" y="18" text-anchor="middle" fill="#475569" font-size="10" font-weight="600" letter-spacing="1">AGENT</text>
  <text x="600" y="110" text-anchor="middle" fill="#475569" font-size="10" font-weight="600" letter-spacing="1">OUTPUT</text>
</svg>
